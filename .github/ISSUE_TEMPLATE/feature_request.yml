name: Feature Request
description: Suggest an improvement to tests, fixtures, or CI quality gates.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: We need coverage for...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the change and expected outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
